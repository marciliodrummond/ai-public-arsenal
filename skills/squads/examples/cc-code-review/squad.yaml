name: code-review
version: "5.0.0"
description: "Automated code review for TypeScript/Node.js — standards, bugs, performance, consolidated report."
author: "gutomec"
license: MIT
slashPrefix: review

tags:
  - code-review
  - typescript
  - quality

components:
  agents:
    - standards-checker.md
    - bug-detector.md
    - performance-analyzer.md
    - report-generator.md
  tasks:
    - check-standards.md
    - detect-bugs.md
    - analyze-performance.md
    - generate-report.md
  workflows:
    - code-review.yaml

# Agent metadata (UI/marketplace only — agents don't need this to function)
agents_metadata:
  standards-checker:
    icon: "📏"
    archetype: Guardian
    color: blue
  bug-detector:
    icon: "🐛"
    archetype: Guardian
    color: red
  performance-analyzer:
    icon: "⚡"
    archetype: Builder
    color: yellow
  report-generator:
    icon: "📊"
    archetype: Builder
    color: green

output:
  base_dir: ./output
  structure:
    findings: "Analysis findings from each agent"
    report: "Consolidated code review report"

state:
  enabled: true
  storage: file
  checkpoint_dir: ".squad-state"
  resume: true

model_strategy:
  orchestrator: "claude-sonnet-4"
  workers: "claude-sonnet-4"

harness:
  doom_loop:
    enabled: true
    max_identical_outputs: 3
    on_detect: abort
  ralph_loop:
    enabled: true
    max_iterations: 3
  context_compaction:
    enabled: true
    strategy: key-fields
    max_handoff_tokens: 4000
  filesystem_collaboration:
    enabled: true
    artifact_dir: output
    cleanup: on_complete
  traces:
    enabled: true
    level: standard
  self_verify:
    default_enabled: true
