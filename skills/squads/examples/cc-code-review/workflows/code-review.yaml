name: code_review
description: "Parallel code analysis (standards, bugs, performance) → consolidated report"

steps:
  - id: check-standards
    agent: standards-checker
    task: check-standards
    depends_on: []

  - id: detect-bugs
    agent: bug-detector
    task: detect-bugs
    depends_on: []

  - id: analyze-performance
    agent: performance-analyzer
    task: analyze-performance
    depends_on: []

  - id: generate-report
    agent: report-generator
    task: generate-report
    depends_on:
      - check-standards
      - detect-bugs
      - analyze-performance

success_indicators:
  - "All target files analyzed"
  - "Report generated with severity breakdown"
  - "Zero unaddressed critical findings"
