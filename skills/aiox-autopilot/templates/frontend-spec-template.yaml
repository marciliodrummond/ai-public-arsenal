# Frontend Spec Template — AIOX Autopilot Nirvana
# Baseado no front-end-spec-tmpl.yaml v2 do AIOX Core

sections:
  - id: introduction
    title: "Introduction"
    instruction: |
      Propósito do documento. Referência ao PRD e personas.

  - id: ux-goals
    title: "UX Goals & Principles"
    instruction: |
      - Target user personas (do discovery)
      - Key usability goals
      - Core design principles (max 5)
      - Accessibility requirements (WCAG level)

  - id: design-system
    title: "Design System"
    subsections:
      - id: tokens
        title: "Design Tokens"
        instruction: |
          - Color palette (primary, secondary, neutral, semantic)
          - Typography scale (font families, sizes, weights)
          - Spacing scale (4px base, 8px, 16px, 24px, 32px, 48px, 64px)
          - Border radius (sm, md, lg, full)
          - Shadows (sm, md, lg)
          - Breakpoints (mobile, tablet, desktop, wide)
      - id: components
        title: "Component Inventory"
        instruction: |
          Lista de componentes necessários por categoria:
          - Layout: Header, Footer, Sidebar, Container, Grid
          - Navigation: Navbar, Breadcrumb, Tabs, Pagination
          - Forms: Input, Select, Checkbox, Radio, TextArea, DatePicker
          - Feedback: Toast, Alert, Modal, Skeleton, Spinner
          - Data Display: Table, Card, Badge, Avatar, List
          Cada componente: nome, variantes, props principais

  - id: screens
    title: "Screen Flows"
    instruction: |
      Para cada tela core do PRD:
      - Wireframe textual (layout em ASCII ou descrição detalhada)
      - Componentes usados
      - Estado da tela (loading, empty, error, success)
      - Transições (de onde vem, para onde vai)
      - Dados exibidos (quais campos, de qual API)

  - id: responsive
    title: "Responsive Strategy"
    instruction: |
      - Mobile-first ou desktop-first
      - Breakpoints e como o layout adapta
      - Componentes que mudam de comportamento (navbar → hamburger, etc.)
      - Touch targets (min 44px para mobile)

  - id: state-management
    title: "State Management"
    instruction: |
      - Server state: React Query / SWR / tRPC
      - Client state: Zustand / Jotai / Context
      - Form state: React Hook Form / Zod
      - URL state: searchParams, dynamic routes

  - id: performance
    title: "Performance Goals"
    instruction: |
      - LCP target (< 2.5s)
      - FID target (< 100ms)
      - CLS target (< 0.1)
      - Bundle size budget
      - Image optimization strategy
      - Code splitting strategy
