# PRD Template — AIOX Autopilot Nirvana
# Baseado no prd-tmpl.yaml v2 do AIOX Core com melhorias para execução autônoma

sections:
  - id: goals-context
    title: "Goals and Background Context"
    instruction: |
      Gerar automaticamente a partir do discovery_report:
      - Goals: bullet list de outcomes desejados (extrair de project_understanding.real_intent)
      - Background: 1-2 parágrafos contextualizando o problema (de market_research)
      - Change Log: tabela Date | Version | Description | Author
    subsections:
      - id: goals
        title: "Goals"
        type: bullet-list
      - id: background
        title: "Background Context"
        type: paragraphs
      - id: changelog
        title: "Change Log"
        type: table
        columns: [Date, Version, Description, Author]

  - id: requirements
    title: "Requirements"
    instruction: |
      Gerar FRs e NFRs a partir do discovery_report + decisões do Commander.
      Cada FR DEVE ter:
      - ID sequencial (FR1, FR2, ...)
      - Descrição clara e testável
      - Prioridade MoSCoW (MUST/SHOULD/COULD/WONT)
      - Acceptance criteria implícito ou explícito
    subsections:
      - id: functional
        title: "Functional Requirements"
        type: numbered-list
        prefix: "FR"
        min_items: 5
      - id: non-functional
        title: "Non-Functional Requirements"
        type: numbered-list
        prefix: "NFR"
        min_items: 3

  - id: ui-goals
    title: "User Interface Design Goals"
    condition: "project has frontend"
    instruction: |
      Derivar de discovery_report.users + tech_landscape:
      - UX Vision geral
      - Paradigmas de interação (SPA, MPA, wizard, dashboard, etc.)
      - Core Screens (lista de telas essenciais)
      - Acessibilidade (None / WCAG AA / WCAG AAA)
      - Branding (se mencionado no brief)
      - Plataformas alvo (Web Responsive / Mobile / Desktop)
    subsections:
      - id: ux-vision
        title: "Overall UX Vision"
      - id: interaction-paradigms
        title: "Key Interaction Paradigms"
      - id: core-screens
        title: "Core Screens and Views"
      - id: accessibility
        title: "Accessibility"
      - id: branding
        title: "Branding"
      - id: target-platforms
        title: "Target Device and Platforms"

  - id: technical-assumptions
    title: "Technical Assumptions"
    instruction: |
      Derivar de discovery_report.tech_landscape + Commander decisions:
      - Stack decidida com justificativa
      - Integrações externas (APIs, serviços)
      - Constraints técnicos (hosting, budget, compliance)
    subsections:
      - id: stack
        title: "Technology Stack"
      - id: integrations
        title: "External Integrations"
      - id: constraints
        title: "Technical Constraints"

  - id: epics
    title: "Epics and High-Level User Stories"
    instruction: |
      Organizar FRs em Epics lógicos. Cada epic:
      - Título claro
      - Escopo (quais FRs cobre)
      - Stories de alto nível (1-2 linhas cada)
      - Prioridade MoSCoW
      - Estimativa rough (S/M/L)
      
      REGRA: Todo FR MUST e SHOULD deve estar em algum epic.
      Epics ordenados por dependência (fundacionais primeiro).
    min_epics: 2

  - id: success-metrics
    title: "Success Metrics"
    instruction: |
      Definir 3-5 métricas mensuráveis de sucesso:
      - KPIs de negócio (conversão, retenção, etc.)
      - KPIs técnicos (performance, uptime, etc.)
      - Critérios de aceite do MVP
