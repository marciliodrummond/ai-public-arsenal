# Story Template — AIOX Autopilot Nirvana
# Baseado no story-tmpl.yaml v2 do AIOX Core

format: |
  # Story {{epic_num}}.{{story_num}}: {{story_title}}
  
  ## Status
  <!-- Draft | Ready | In Progress | In Review | Done -->
  **Status:** Draft
  **Epic:** {{epic_title}}
  **Priority:** {{priority}}
  **Complexity:** {{complexity}} (S/M/L)
  **Estimated:** {{estimated_hours}}h
  
  ## Context
  {{context_from_prd}}
  
  ## Objective
  {{one_line_objective}}
  
  ## Acceptance Criteria
  {{#each acceptance_criteria}}
  - [ ] **AC{{@index}}**: Given {{given}}, When {{when}}, Then {{then}}
  {{/each}}
  
  ## Technical Notes
  ### Architecture Context
  {{architecture_excerpt}}
  
  ### Data Model Impact
  {{data_model_changes}}
  
  ### API Changes
  {{api_changes}}
  
  ## Implementation Plan
  ### Files to Create
  {{#each files_to_create}}
  - `{{this}}`
  {{/each}}
  
  ### Files to Modify
  {{#each files_to_modify}}
  - `{{this}}`
  {{/each}}
  
  ## Dependencies
  - **Depends on:** {{depends_on}}
  - **Blocks:** {{blocks}}
  
  ## Dev Notes
  <!-- Builder preenche durante implementação -->
  
  ## Testing
  ### Unit Tests
  {{unit_test_hints}}
  
  ### Integration Tests
  {{integration_test_hints}}
  
  ## File List
  <!-- Builder atualiza com arquivos realmente criados/modificados -->
  
  ## Change Log
  | Date | Author | Change |
  |------|--------|--------|
  | {{date}} | Story Forge | Initial creation |

rules:
  - "Cada story DEVE ser self-contained: dev não precisa ler PRD"
  - "Acceptance criteria DEVEM ser Given/When/Then testáveis"
  - "Files to create/modify DEVEM corresponder ao source tree da Architecture"
  - "Máximo 4h por story: se maior, quebrar"
  - "Technical Notes: incluir trechos relevantes da Architecture, não referências vagas"
